name: figma_flow_analyzer
description: A professional SaaS dashboard for analyzing Figma flows and generating path matrices.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^13.0.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  data_table_2: ^2.5.12
  intl: ^0.19.0
  url_launcher: ^6.2.4
  flutter_svg: ^2.0.9
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
